name: Release PowerShell Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Numeric module version to package (for example 1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-release:
    name: Package Release Module
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Generate seeded catalog artifact
        shell: pwsh
        run: .\scripts\build-catalog-artifact.ps1 -InstallToCatalogRoot

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          }
          else {
            $version = '${{ github.ref_name }}' -replace '^v', ''
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Version '$version' must be numeric and match x.y.z or x.y.z.w."
          }

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore solution
        run: dotnet restore .\DataGen.slnx

      - name: Run solution tests
        run: dotnet test .\DataGen.slnx -v minimal /p:UseSharedCompilation=false -m:1 --no-restore

      - name: Package PowerShell module
        shell: pwsh
        run: .\scripts\package-module.ps1 -Version ${{ steps.version.outputs.value }} -Configuration Release

      - name: Create gallery package and publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGAL: ${{ secrets.PSGAL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGAL)) {
            throw "The PSGAL secret is not configured."
          }

          $publishPath = Join-Path $PWD 'artifacts\module\publish\SyntheticEnterprise.PowerShell'
          $nupkgOutput = Join-Path $PWD 'artifacts\psgallery'

          New-Item -ItemType Directory -Path $nupkgOutput -Force | Out-Null
          Set-PSResourceRepository -Name PSGallery -Trusted

          Publish-PSResource `
            -Path $publishPath `
            -Repository PSGallery `
            -ApiKey $env:PSGAL `
            -DestinationPath $nupkgOutput `
            -SkipDependenciesCheck

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyntheticEnterprise.PowerShell-${{ steps.version.outputs.value }}
          path: |
            artifacts/module/**
            artifacts/catalog/catalogs.sqlite
            artifacts/psgallery/*.nupkg

      - name: Publish GitHub release assets
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/module/*.zip
            artifacts/catalog/catalogs.sqlite
            artifacts/psgallery/*.nupkg
