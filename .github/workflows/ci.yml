name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dotnet-validation:
    name: Build, Test, and Package Module
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Generate seeded catalog artifact
        shell: pwsh
        run: .\scripts\build-catalog-artifact.ps1 -InstallToCatalogRoot

      - name: Restore solution
        run: dotnet restore .\DataGen.slnx

      - name: Run solution tests
        run: dotnet test .\DataGen.slnx -v minimal /p:UseSharedCompilation=false -m:1 --no-restore

      - name: Package PowerShell module
        shell: pwsh
        run: .\scripts\package-module.ps1 -Version 0.1.${{ github.run_number }} -Configuration Release

      - name: Upload module package artifact
        uses: actions/upload-artifact@v6
        with:
          name: SyntheticEnterprise.PowerShell-ci-package
          path: artifacts/module/**

      - name: Upload seeded catalog artifact
        uses: actions/upload-artifact@v6
        with:
          name: catalogs-sqlite-ci
          path: artifacts/catalog/catalogs.sqlite

  docs-validation:
    name: Build Docs Site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build Docusaurus site
        working-directory: website
        env:
          DOCS_SITE_URL: https://${{ github.repository_owner }}.github.io
          DOCS_BASE_URL: /${{ github.event.repository.name }}/
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: npm run build
